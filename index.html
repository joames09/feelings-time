<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Your Feelings</title>
    <!-- Connect to the style sheet -->
    <link rel="stylesheet" href="./style.css">
    <!-- Connect to the javascript engine -->
    <script src="script.js" defer></script>
</head>
<body>

    <div class="container" id="mainContainer">
        
        <!-- PAGE 1: NICKNAME ENTRY -->
        <div id="page1" class="page active">
            <h2>Welcome ✨</h2>
            <input type="text" id="nickname" placeholder="Enter your nickname...">
            <button id="nextBtn">Next</button>
            <button id="adminBtn" class="secret-admin-btn">Admin</button>
        </div>

        <!-- PAGE 2: STATUS CHECK -->
        <div id="page2" class="page">
            <h2>Are you alright or not?</h2>
            <div class="btn-group">
                <button id="alrightBtn">Alright</button>
                <button id="notAlrightBtn">Not Alright</button>
            </div>
        </div>

        <!-- PAGE 3: QUESTIONNAIRE -->
        <div id="page3" class="page">
            <h2>Tell us more...</h2>
            
            <label>1. If you look back at school, who was that one hidden crush you were completely obsessed with, but too shy to ever tell anyone? 💛💛</label>
            <textarea id="q1" rows="2"></textarea>

            <label>2. What thing makes you happy, but you always act as you don't care?</label>
            <textarea id="q2" rows="2"></textarea>

            <label>4. What is your most memorable day that you won't forget in your life?</label>
            <textarea id="q4" rows="2"></textarea>

            <label>5. Who is your crush? ❤️❤️</label>
            <input type="text" id="q5">

            <button id="submitBtn">Submit</button>
        </div>

        <!-- PAGE 4: SMILE ALWAYS -->
        <div id="page4" class="page">
            <h1 style="font-size: 40px;">smile always 🙂🙂</h1>
        </div>

        <!-- PAGE 5: NOT ALRIGHT (MUSIC & AUDIO PLAYER) -->
        <div id="page5" class="page">
            <h2>Take a deep breath and listen... 🎧</h2>
            <p>Music is playing in the background to comfort you.</p>
            <audio id="sadSong" loop>
                <source src="https://snfdxgjnwdihrjcwuess.supabase.co/storage/v1/object/public/music/feelings.mp3.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <button id="backBtn">Go Back</button>
        </div>

        <!-- PAGE 6: ADMIN RESPONSES VIEW -->
        <div id="page6" class="page">
            <h2>Admin Dashboard</h2>
            <div id="adminData">Loading responses...</div>
            <button id="exitAdminBtn" style="background: #555;">Exit Admin</button>
        </div>

    </div>

</body>
</html>
