<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fellings time 😊💛</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FLOATING BACKGROUND FLOWERS -->
    <div class="flower-bg top-left">🌸</div>
    <div class="flower-bg bottom-right">🦋</div>
    <div class="flower-bg top-right">🌿</div>
    <div class="flower-bg bottom-left">🪻</div>

    <div class="container">
        
        <!-- PAGE 1: NICKNAME ENTRY -->
        <div id="page1" class="page active">
            <h2>Welcome ✨</h2>
            <input type="text" id="nickname" placeholder="Enter your nickname...">
            <button id="nextBtn">Next</button>
            <button id="adminBtn" class="secret-admin-btn">Admin</button>
        </div>
            <!-- NEW SECRET ADMIN LINK FOR JOEL ONLY -->
            <span class="admin-link" onclick="openAdminPanel()">✨ (For Admin Only) ✨</span>
        </div>

        <!-- PAGE 2: STATUS CHECK -->
        <div id="page2" class="page">
            <h2>Are you alright or not?</h2>
            <div class="btn-group">
                <button id="alrightBtn">Alright</button>
                <button id="notAlrightBtn">Not Alright</button>
            </div>
        </div>
        <!-- PAGE 3: QUESTIONNAIRE -->
        <div id="page3" class="page">
            <h2>Tell us more...</h2>
            
            <label>1. If you look back at school, who was that one hidden crush you were completely obsessed with, but too shy to ever tell anyone? 💛💛</label>
            <textarea id="q1" rows="2"></textarea>

            <label>2. What thing makes you happy, but you always act as you don't care?</label>
            <textarea id="q2" rows="2"></textarea>

            <label>4. What is your most memorable day that you won't forget in your life?</label>
            <textarea id="q4" rows="2"></textarea>

            <label>5. Who is your crush? ❤️❤️</label>
            <input type="text" id="q5">

            <button id="submitBtn">Submit</button>
        </div>
        

        <!-- PAGE 4: BEAUTIFUL ADMIN POSTCARD PANEL -->
        <div id="admin-page" class="page">
            <h2>Garden Subscriptions</h2>
            <p>Secrets told by Jumamji:</p>
            <div id="responses-container">
                <!-- User responses will slide here -->
            </div>
            
            <button onclick="clearAllData()" class="wipe-btn">Clear Jumanji Memory 🗑️</button>
            <button onclick="goBackToLogin()" class="back-btn">Back to Login</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
